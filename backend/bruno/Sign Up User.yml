info:
  name: Sign Up User
  type: http
  seq: 3

http:
  method: POST
  url: http://localhost:8080/api/v1/auth/signup
  body:
    type: json
    data: |-
      {
        "email": "email",
        "password": "password",
        "username": "username",
        "public_key": "public_key_in_base_64",
        "salt_kdf": "salt_from_keypair_in_base64"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
